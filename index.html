<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blair Page | Portfolio</title>

<style>
/* =========================
   COLOR SYSTEM
   ========================= */
:root {
  --black: #000000ff;
  --midnight-violet: #291528ff;
  --charcoal-brown: #3a3e3bff;
  --ghost-white: #f0eff4ff;
  --dusty-mauve: #9e829cff;
  --text-light: var(--ghost-white);
  --glass-bg: rgba(240,239,244,0.08);
  --glass-border: rgba(240,239,244,0.22);
  --bg-light: linear-gradient(135deg,#000000ff 0%,#291528ff 30%,#3a3e3bff 60%,#9e829cff 85%,#f0eff4ff 100%);
}

/* DARK MODE */
body.dark {
  --bg-light: linear-gradient(135deg,#000000ff 0%,#1a0d19 35%,#291528ff 70%,#3a3e3bff 100%);
  --glass-bg: rgba(0,0,0,0.65);
  --glass-border: rgba(240,239,244,0.12);
  --text-light: #f8f7fb;
}

/* =========================
   GLOBAL STYLES
   ========================= */
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',sans-serif;background:var(--bg-light);color:var(--text-light);transition:background 0.35s ease,color 0.25s ease;display:flex;flex-direction:column;min-height:100vh;}
button{outline:none;-webkit-tap-highlight-color:transparent;}
.container{display:flex;justify-content:center;align-items:center;flex:1;padding:1rem;}

/* =========================
   TOP BAR
   ========================= */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.6rem;font-size:0.72rem;position:relative;z-index:100;}
.site-nav a{margin:0 1rem;color:var(--dusty-mauve);text-decoration:none;font-weight:600;}
.site-nav a:hover{color:var(--ghost-white);text-decoration:underline;}

/* THEME TOGGLE BUTTON (MATCH BLOG.HTML) */
.theme-btn{
  border:2px solid var(--glass-border); /* slightly thicker */
  border-radius:20px; /* pill shape */
  padding:0.4rem 1rem;
  background:var(--glass-bg);
  color:var(--text-light);
  cursor:pointer;
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.85rem;
  transition: background 0.2s ease,border 0.2s ease,transform 0.12s ease,color 0.2s ease;
}
.theme-btn:hover{background:rgba(240,239,244,0.06);border:2px solid rgba(240,239,244,0.22);}
.theme-btn:active{transform:scale(0.92);background:rgba(240,239,244,0.08);border:2px solid rgba(240,239,244,0.22);}
body.dark .theme-btn{border:2px solid var(--glass-border);}
body.dark .theme-btn:hover{background:rgba(0,0,0,0.45);border:2px solid rgba(240,239,244,0.12);}
body.dark .theme-btn:active{background:rgba(0,0,0,0.65);border:2px solid rgba(240,239,244,0.12);}

/* =========================
   HERO
   ========================= */
.hero{position:fixed;top:0;left:0;width:100%;height:100vh;overflow:hidden;z-index:-1;}
.hero video{width:100%;height:100%;object-fit:cover;filter:brightness(0.6);cursor:pointer;}

/* =========================
   LOGO
   ========================= */
.logo-top-left{position:absolute;top:100px;left:16px;width:60px;height:60px;border-radius:50%;overflow:hidden;cursor:pointer;border:3px solid rgba(240,239,244,.45);box-shadow:0 8px 20px rgba(0,0,0,.7);transition:transform .3s ease, box-shadow .3s ease;z-index:1000;}
.logo-top-left img{width:100%;height:100%;object-fit:cover;}

/* =========================
   PAGE TITLE
   ========================= */
.blog-page-title{text-align:center;font-size:5em;font-weight:700;font-family:'Segoe UI',sans-serif;color:var(--text-light);text-shadow:0 2px 10px rgba(0,0,0,0.5);margin-top:25vh;margin-bottom:3rem;transition:color 0.7s ease;}

/* =========================
   BLOG GRID
   ========================= */
.blog-wrapper{position:relative;top:0;max-width:1200px;margin:auto;padding:2rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:2rem;}
.blog-card{position:relative;background:var(--glass-bg);backdrop-filter:blur(14px);border-radius:16px;padding:1.6rem;box-shadow:0 12px 30px rgba(0,0,0,.6);cursor:pointer;transition:transform .25s ease,box-shadow .25s ease;color:var(--text-light);overflow:hidden;}
.blog-card *{position:relative;z-index:1;}
.blog-card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(0,0,0,.8);}
.blog-card::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;border-radius:16px;background:rgba(0,0,0,0.18);z-index:0;pointer-events:none;transition:background 0.3s ease;}
.blog-card:nth-child(3n+1)::before{background:rgba(0,0,0,0.15);}
.blog-card:nth-child(3n+2)::before{background:rgba(0,0,0,0.18);}
.blog-card:nth-child(3n+3)::before{background:rgba(0,0,0,0.20);}
.blog-header{display:flex;justify-content:flex-end;align-items:center;}
.expand-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);font-size:20px;cursor:pointer;}
.blog-card.active .expand-btn{transform:rotate(180deg);}
.blog-card h2{margin:.5rem 0;color:var(--dusty-mauve);}
.preview{font-size:.95rem;line-height:1.5;color:#6b7ed1;}
.blog-content{max-height:0;overflow:hidden;transition:max-height .5s ease;line-height:1.6;margin-top:1rem;color:var(--text-light);}
.blog-card.active .blog-content{max-height:10000px;}
.blog-card.expanded{position:fixed;top:6vh;left:50%;transform:translateX(-50%);width:85vw;max-width:1100px;height:88vh;overflow-y:auto;z-index:9999;padding:2.5rem;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.85);background:var(--midnight-violet);}
.blog-card.expanded h1,.blog-card.expanded h2,.blog-card.expanded h3,.blog-card.expanded h4{color:#b05263;}
.blog-card.expanded p,.blog-card.expanded li{color:var(--text-light);}
body.article-open .blog-card:not(.expanded){opacity:.15;pointer-events:none;transform:scale(.95);}

/* =========================
   RESPONSIVE
   ========================= */
@media(max-width:900px){
  .logo-top-left{top:80px;width:50px;height:50px;}
  .blog-wrapper{grid-template-columns:1fr;}
  .blog-card.expanded{width:90vw;height:85vh;padding:1.5rem;}
  .blog-page-title{font-size:3em;margin-top:20vh;}
  .theme-btn{padding:.3rem .8rem;font-size:.75rem;}
}
</style>

</head>
<body>

<header class="top-bar">
  <div class="credential-header">
    RHCE6 · AWS Cloud Practitioner · AWS Solutions Architect Associate
  </div>
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="blog.html">Blog</a>
  </nav>
  <button id="themeToggle" class="theme-btn">🌙</button>
</header>

<a href="index.html" class="logo-top-left">
  <img src="https://i.postimg.cc/wjBSDH9v/1000045246.jpg">
</a>

<div class="hero">
  <video id="heroVideo" autoplay muted loop playsinline>
    <source src="hero.mp4" type="video/mp4">
  </video>
</div>

<div class="blog-page-title">Blair Page Blog</div>

<main class="blog-wrapper" id="blogContainer"></main>

<script>
/* HERO VIDEO */
const heroVideo = document.getElementById("heroVideo");
heroVideo.addEventListener("click",()=>{ heroVideo.paused ? heroVideo.play() : heroVideo.pause(); });

/* THEME TOGGLE */
const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("click",()=>{
  document.body.classList.toggle("dark");
  themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
});

/* BLOG LOADER */
const container = document.getElementById("blogContainer");
let postNumber = 1;
async function loadPosts(){
  while(true){
    try{
      const response = await fetch(`posts/post${postNumber}.txt`);
      if(!response.ok) break;
      const text = await response.text();

      const titleMatch = text.match(/<h1>(.*?)<\/h1>/);
      const title = titleMatch ? titleMatch[1] : `Post ${postNumber}`;

      const previewMatch = text.match(/<p>(.*?)<\/p>/);
      const preview = previewMatch ? previewMatch[1] : "";

      const card = document.createElement("article");
      card.className="blog-card";

      card.innerHTML=`
      <div class="blog-header">
        <div class="expand-btn">+</div>
      </div>
      <h2>${title}</h2>
      <p class="preview">${preview}</p>
      <div class="blog-content">${text}</div>
      `;

      container.appendChild(card);

      const btn = card.querySelector(".expand-btn");

      btn.addEventListener("click", e=>{
        e.stopPropagation();
        toggleArticle(card,btn);
      });

      card.addEventListener("click", ()=>{
        toggleArticle(card,btn);
      });

      postNumber++;
    }catch(e){break;}
  }
}

function toggleArticle(card,btn){
  if(card.classList.contains("expanded")){
    card.classList.remove("expanded");
    card.classList.remove("active");
    document.body.classList.remove("article-open");
    btn.textContent="+";
  }else{
    document.querySelectorAll(".blog-card").forEach(c=>{
      c.classList.remove("expanded");
      c.classList.remove("active");
    });
    document.body.classList.add("article-open");
    card.classList.add("expanded");
    card.classList.add("active");
    btn.textContent="−";
  }
}

loadPosts();
</script>

</body>
</html>
