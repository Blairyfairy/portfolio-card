<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blair Page | Portfolio</title>
<link rel="stylesheet" href="style.css">

<style>
:root {
  --black: #000000ff;
  --midnight-violet: #291528ff;
  --charcoal-brown: #3a3e3bff;
  --ghost-white: #f0eff4ff;
  --dusty-mauve: #9e829cff;
  --text-light: var(--ghost-white);
  --glass-bg: rgba(240,239,244,0.08);
  --glass-border: rgba(240,239,244,0.22);
  --link-primary: #9e829c;
  --link-hover: #f0eff4;
  --highlight: #b05263;
  --accent: #6b7ed1;
}

/* =========================
   TOP BAR
   ========================= */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1rem 2rem;
  font-size:.85rem;
  position:absolute;
  top:0;
  width:100%;
  z-index:100;
}

.site-nav a{
  margin:0 1rem;
  color:var(--dusty-mauve);
  text-decoration:none;
  font-weight:600;
}
.site-nav a:hover{
  text-decoration:underline;
  color:var(--link-hover);
}

/* THEME TOGGLE BUTTON MATCHING BLOG.HTML */
.theme-btn{
  background:var(--glass-bg);
  border:2px solid var(--glass-border); /* thicker than default */
  border-radius:20px; /* pill shape */
  padding:.4rem 1rem;
  cursor:pointer;
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.85rem;
  transition: background 0.2s ease, border 0.2s ease, transform 0.12s ease, color 0.2s ease;
}
.theme-btn:hover{
  background:rgba(240,239,244,0.06);
  border:2px solid rgba(240,239,244,0.22);
}
.theme-btn:active{
  transform:scale(0.92);
  background:rgba(240,239,244,0.08);
  border:2px solid rgba(240,239,244,0.22);
}

/* DARK MODE */
body.dark .theme-btn{
  border:2px solid var(--glass-border);
}
body.dark .theme-btn:hover{
  background:rgba(0,0,0,0.45);
  border:2px solid rgba(240,239,244,0.12);
}
body.dark .theme-btn:active{
  background:rgba(0,0,0,0.65);
  border:2px solid rgba(240,239,244,0.12);
}

/* =========================
   PORTFOLIO CARD STYLES
   ========================= */
body{
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:var(--text-light);
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  transition: background 0.35s ease,color 0.25s ease;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-start;
  padding:6rem 2rem 2rem 2rem;
  gap:2rem;
}

.portfolio-card{
  width:300px;
  background:rgba(255,255,255,0.08);
  border-radius:16px;
  padding:1.5rem;
  backdrop-filter:blur(12px);
  box-shadow:0 12px 30px rgba(0,0,0,.6);
  cursor:pointer;
  transition:transform .25s ease,box-shadow .25s ease;
}
.portfolio-card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,.8);
}
.portfolio-card h2{
  margin:.5rem 0;
  color:var(--dusty-mauve);
}
.portfolio-card p{
  color:var(--accent);
  font-size:.95rem;
  line-height:1.5;
}

/* RESPONSIVE */
@media(max-width:900px){
  .container{flex-direction:column;align-items:center;padding-top:4rem;}
  .theme-btn{padding:.3rem .8rem;font-size:.75rem;}
}
</style>
</head>

<body>

<header class="top-bar">
  <div class="credential-header">
    RHCE6 · AWS Cloud Practitioner · AWS Solutions Architect Associate
  </div>
  <nav class="site-nav">
    <a href="#">Home</a>
    <a href="#">Portfolio</a>
    <a href="#">Contact</a>
  </nav>
  <button id="themeToggle" class="theme-btn">🌙</button>
</header>

<div class="container" id="portfolioContainer">
  <!-- Portfolio cards will be loaded here -->
</div>

<script src="portfolio.js"></script>
</body>
</html>
